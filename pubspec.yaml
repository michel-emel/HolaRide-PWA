name: holaride_app
description: HolaRide — intercity ride-sharing for Cameroon.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  cupertino_icons: ^1.0.6
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  geolocator: ^11.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_background_service: ^5.0.10
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/splash_bg.jpg
    - assets/images/hero_car.png
    - assets/images/empty_trips_bg.png
    - assets/images/ride_share_car.png
